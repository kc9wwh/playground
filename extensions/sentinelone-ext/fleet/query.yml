---
apiVersion: v1
kind: query
spec:
  name: SentinelOne agent status
  description: >-
    Returns the installed SentinelOne agent's version, ID, health status,
    management server, and last check-in. Returns no rows when SentinelOne
    is not installed on the host.
  query: >-
    SELECT
      agent_version,
      agent_id,
      install_date,
      operational_state,
      protection,
      ready,
      infected,
      network_quarantine,
      compatible_os,
      management_server,
      management_site_key,
      management_last_seen,
      management_connected
    FROM sentinelone;
  platform: darwin,linux,windows
  interval: 3600
  observer_can_run: true
