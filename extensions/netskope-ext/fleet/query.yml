---
apiVersion: v1
kind: query
spec:
  name: Netskope client state
  description: >
    Returns the current Netskope client state, version, tenant, and tunnel
    status. Use with scheduled packs for fleet-wide reporting into
    BigQuery/Looker.
  query: >
    SELECT
      orgname,
      tenant_url,
      client_status,
      tunnel_status,
      tunnel_protocol,
      traffic_mode,
      steering_config,
      config,
      email,
      gateway,
      gateway_ip,
      client_version,
      install_path,
      error
    FROM netskope;
  interval: 3600
  platform: darwin,linux,windows
  observer_can_run: true
